<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungry? Let's Figure It Out 🍴</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --background: #0d0d0d;
  --surface: #161616;
  --border: #2a2a2a;
  --text: #f0ece4;
  --muted: #666;
  --accent: #ff5c35;
  --accent2: #ffb800;
  --accent3: #4ef0b0;
  --pill: #1e1e1e;
}

body {
  background: var(--background);
  color: var(--text);
  font-family: 'Epilogue', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
}

body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}

body::before {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #ff5c3520 0%, transparent 70%);
  top: -100px; left: -100px;
  animation: drift1 10s ease-in-out infinite alternate;
}

body::after {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #ffb80018 0%, transparent 70%);
  bottom: -80px; right: -80px;
  animation: drift2 12s ease-in-out infinite alternate;
}

@keyframes drift1 { to { transform: translate(60px, 80px); } }
@keyframes drift2 { to { transform: translate(-60px, -60px); } }

.wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 520px;
}

.header {
  margin-bottom: 36px;
  animation: fadeUp .6s cubic-bezier(.2,.8,.2,1) both;
}

.header .tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--pill);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 5px 14px 5px 10px;
  font-size: .72rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 18px;
}

.header .tag span { color: var(--accent); font-size: 1rem; }

.header h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.2rem, 7vw, 3.2rem);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -.02em;
}

.header h1 .hi { color: var(--text); }

.header h1 .hungry {
  color: transparent;
  -webkit-text-stroke: 1.5px var(--accent);
}

.header h1 .help { color: var(--accent2); }

.header p {
  margin-top: 12px;
  color: var(--muted);
  font-size: .9rem;
  font-weight: 300;
  line-height: 1.5;
}

.progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
  animation: fadeUp .6s .1s cubic-bezier(.2,.8,.2,1) both;
}

.progress-track {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

.progress-label {
  font-size: .75rem;
  color: var(--muted);
  white-space: nowrap;
  font-weight: 300;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px 28px;
  animation: cardIn .45s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes cardIn {
  from { opacity:0; transform: translateY(20px) scale(.98); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.q-number {
  font-size: .7rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 8px;
}

.q-text {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.3rem, 4.5vw, 1.75rem);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 28px;
  color: var(--text);
}

.options {
  display: grid;
  gap: 10px;
}

.options.col2 { grid-template-columns: 1fr 1fr; }

.opt {
  background: var(--background);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px 14px;
  cursor: pointer;
  text-align: left;
  font-family: 'Epilogue', sans-serif;
  color: var(--text);
  transition: border-color .18s, background .18s, transform .15s;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.opt .icon {
  font-size: 1.6rem;
  line-height: 1;
}

.opt .label {
  font-size: .88rem;
  font-weight: 400;
  line-height: 1.3;
}

.opt:hover {
  border-color: #444;
  background: #1a1a1a;
  transform: translateY(-2px);
}

.opt.selected {
  border-color: var(--accent);
  background: #1f1008;
}

.opt.selected .label { color: var(--accent2); }

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  animation: fadeUp .5s .15s cubic-bezier(.2,.8,.2,1) both;
}

.btn-back {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Epilogue', sans-serif;
  font-size: .88rem;
  cursor: pointer;
  transition: color .2s;
  padding: 8px 0;
}

.btn-back:hover { color: var(--text); }

.btn-back:disabled { opacity:.25; cursor:default; }

.btn-next {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 13px 30px;
  font-family: 'Syne', sans-serif;
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  transition: background .18s, transform .15s, box-shadow .2s;
  box-shadow: 0 0 0 0 #ff5c3500;
  letter-spacing: .02em;
}

.btn-next:hover:not(:disabled) {
  background: #ff3a10;
  transform: translateY(-2px);
  box-shadow: 0 8px 30px #ff5c3540;
}

.btn-next:disabled {
  background: #2a2a2a;
  color: #444;
  cursor: default;
}

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 28px;
  text-align: center;
  animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes popIn {
  from { opacity:0; transform: scale(.88); }
  to   { opacity:1; transform: scale(1); }
}

.result-card .big { font-size: 80px; line-height: 1; margin-bottom: 20px; display: block; }

.result-card h2 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 800;
  margin-bottom: 6px;
  color: var(--text);
}

.result-card .sub {
  color: var(--accent2);
  font-size: .85rem;
  font-weight: 300;
  letter-spacing: .05em;
  margin-bottom: 28px;
  text-transform: uppercase;
}

.ideas {
  background: var(--background);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 20px;
  text-align: left;
  margin-bottom: 28px;
}

.ideas-title {
  font-size: .68rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent3);
  margin-bottom: 14px;
  font-weight: 500;
}

.idea-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: .9rem;
  color: var(--text);
  font-weight: 300;
}

.idea-item:last-child { border-bottom: none; padding-bottom: 0; }

.idea-item .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.btn-restart {
  background: var(--pill);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 12px;
  padding: 12px 28px;
  font-family: 'Epilogue', sans-serif;
  font-size: .88rem;
  cursor: pointer;
  transition: all .2s;
}

.btn-restart:hover {
  border-color: #555;
  color: var(--text);
  transform: translateY(-1px);
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(14px); }
  to   { opacity:1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="tag"><span>🍴</span> Annie's personnal food mood finder</div>
    <h1>
      <span class="hi">Hey </span><span class="name">Annie,</span><br>
      <span class="hungry">hungry?</span><br>
      <span class="help">let me help you.</span>
    </h1>
    <p>Answer 7 quick questions. Don't worry, no wrong answers! We will figure out what you want to eat.</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    <div class="progress-label" id="pLabel">1 / 7</div>
  </div>

  <div id="mainArea"></div>

  <div class="nav" id="navArea">
    <button class="btn-back" id="btnBack" onclick="prev()" disabled>← Back</button>
    <button class="btn-next" id="btnNext" onclick="next()" disabled>Next →</button>
  </div>

</div>

<script>
const Qs = [
  {
    q: "How hungry are you right now?",
    col2: true,
    opts: [
      { icon:"🍃", label:"Just a little something" },
      { icon:"😐", label:"Moderately hungry" },
      { icon:"😤", label:"Pretty hungry" },
      { icon:"🦁", label:"Absolutely starving" },
    ]
  },
  {
    q: "Sweet or savoury?",
    col2: true,
    opts: [
      { icon:"🍬", label:"Sweet" },
      { icon:"🧂", label:"Savory" },
      { icon:"🤷", label:"Both! Why choose?" },
      { icon:"😶", label:"No real preference" },
    ]
  },
  {
    q: "Warm & comforting or cold & refreshing?",
    col2: true,
    opts: [
      { icon:"♨️", label:"Warm & cozy" },
      { icon:"❄️", label:"Cold & refreshing" },
      { icon:"🌤️", label:"Either is fine" },
    ]
  },
  {
    q: "What's your current mood?",
    col2: true,
    opts: [
      { icon:"🛋️", label:"Tired, need comfort" },
      { icon:"🎉", label:"Happy & treating myself" },
      { icon:"😮‍💨", label:"Stressed, need calm" },
      { icon:"😌", label:"Just chilling" },
    ]
  },
  {
    q: "What texture sounds good?",
    col2: true,
    opts: [
      { icon:"🧈", label:"Soft & creamy" },
      { icon:"🥨", label:"Crunchy & crispy" },
      { icon:"🥖", label:"Chewy & hearty" },
      { icon:"🥗", label:"Light & fresh" },
    ]
  },
  {
    q: "How much effort can you be bothered with?",
    col2: true,
    opts: [
      { icon:"📱", label:"Zero, just order it" },
      { icon:"🔥", label:"Heat something up" },
      { icon:"🍳", label:"Quick cook is fine" },
      { icon:"👨‍🍳", label:"I actually want to cook" },
    ]
  },
  {
    q: "Any flavour world calling you?",
    col2: true,
    opts: [
      { icon:"🌏", label:"Asian & Southeast Asian" },
      { icon:"🍝", label:"European specialities" },
      { icon:"🍲", label:"Classic comfort food" },
      { icon:"🤷", label:"Surprise me" },
    ]
  }
];

const Results = {
  get: (a) => {
    const hunger  = a[0]; // 0=tiny, 1=moderate, 2=pretty, 3=starving
    const taste   = a[1]; // 0=sweet, 1=savoury, 2=both, 3=no pref
    const temp    = a[2]; // 0=warm, 1=cold, 2=either
    const mood    = a[3]; // 0=tired, 1=happy, 2=stressed, 3=chill
    const texture = a[4]; // 0=soft/creamy, 1=crunchy, 2=chewy, 3=light/fresh
    const effort  = a[5]; // 0=order, 1=heat, 2=quick cook, 3=full cook
    const cuisine = a[6]; // 0=asian, 1=italian/french, 2=comfort, 3=surprise

    // ── SWEET PATH ─────────────────────────────────────────────────────────
    if (taste === 0) {

      if (temp !== 0 && texture === 0) {
        if (hunger <= 1) return {
          emoji:"🍧", title:"Something cold & creamy",
          sub:"Cold • Creamy • Light",
          note:"You know exactly where this is going 😂",
          ideas: [
            "Bingsu with mango, red bean & condensed milk",
            "Chocolate chips ice cream, two scoops, no debate",
            "Mint chocolate gelato, underrated and you know it",
            "Franui frozen raspberries coated in chocolate, straight from the box"
          ]
        };
        return {
          emoji:"🍨", title:"A cold dessert moment",
          sub:"Indulgent • Cold • No Regrets",
          note:"Hungry but sweet? Cold energy it is.",
          ideas:[
            "Ice cream sundae with warm brownie on the side",
            "Bingsu, large portion, all the toppings",
            "Mochi ice cream, a few different flavours",
            "Frozen yogurt with fresh fruit & honey drizzle"
          ]
        };
      }

      if (temp !== 1 && (texture === 0 || texture === 2)) {
        if (mood === 0 || mood === 2) return {
          emoji:"🥞", title:"Soft, warm & comforting",
          sub:"Warm • Soft • Feel-Good",
          note:"Sometimes you just need something pillowy and sweet.",
          ideas:[
            "Japanese fluffy pancakes, the tall ones",
            "Classic pancakes with chocolate sauce & sliced banana",
            "French toast with berries & a cloud of whipped cream",
            "Warm crêpes with sugar, simple and perfect"
          ]
        };
        return {
          emoji:"🍓", title:"Sweet & a little celebratory",
          sub:"Sweet • Fruity • Feel-Good",
          note:"Happy mood calls for pretty food.",
          ideas:[
            "Strawberry shortcake with fresh cream, your comfort classic",
            "Waffles with berries & crème chantilly",
            "Mont Blanc, chestnut cream & meringue, very French, very good",
            "Fresh fruit tart from a bakery"
          ]
        };
      }

      if (temp === 1 && texture === 3) return {
        emoji:"🫐", title:"Fresh, light & fruity",
        sub:"Cold • Light • Refreshing",
        note:"Not heavy at all, exactly what you need.",
        ideas:[
          "Açaí bowl with strawberry, banana & a little granola",
          "Fruit salad with a chocolate drizzle (yes, it works, trust)",
          "Starbucks refresher or iced matcha latte (no coffee!)",
          "Three-colour dessert drink, cold & fun"
        ]
      };

      if (texture === 1) return {
        emoji:"🍪", title:"Sweet & crunchy snack mode",
        sub:"Sweet • Crunchy • Easy",
        note:"No shame, classic snack brain.",
        ideas:[
          "Double chocolate chip cookies, warm if possible",
          "Mini churros with chocolate dipping sauce",
          "Chocolate-covered pretzels, sweet & salty, best combo",
          "Stroopwafel, one of those unexpectedly good things"
        ]
      };

      return {
        emoji:"🍫", title:"Full chocolate moment",
        sub:"Rich • Sweet • Very You",
        note:"When in doubt. You know the answer is chocolate.",
        ideas:[
          "Warm chocolate fondant with a scoop of vanilla ice cream",
          "Rich hot chocolate, not too sweet, proper thick",
          "Franui frozen raspberries coated in chocolate, from the freezer",
          "Chocolate lava cake, order it or make it, both are fine"
        ]
      };
    }

    // ── SAVOURY PATH ──────────────────────────────────────────────────────────
    if (taste === 1) {

      if (cuisine === 0) {
        if (temp !== 1 && hunger >= 2) return {
          emoji:"🍛", title:"Bold, warm & filling, Southeast Asian",
          sub:"Warm • Crispy • Full Flavour",
          note:"You came here, you knew what you wanted.",
          ideas:[
            "Nam khao, Laos crispy rice salad with herbs & pork",
            "Nem nướng, Vietnamese grilled pork skewers with fresh herbs & rice paper",
            "Khao piak, slow rice noodle soup with pork",
            "Beef laab with sticky rice, bold and satisfying"
          ]
        };
        if (temp === 1 || texture === 3) return {
          emoji:"🥗", title:"Fresh, punchy & light, Asian style",
          sub:"Fresh • Herby • No Heavy Feeling",
          note:"Light but never boring, that's the whole point.",
          ideas:[
            "Tum mak hoong, classic papaya salad with beef jerky",
            "Spring rolls with pork and shrimps ?",
            "Green mango salad with crispy shallots & toasted sesame",
            "Lemongrass beef skewer plate with a big bowl of rice on the side"
          ]
        };
        return {
          emoji:"🍜", title:"Warm, aromatic broth & noodles",
          sub:"Warm • Fragrant • Comforting",
          note:"A good bowl fixes a lot of things.",
          ideas:[
            "Phở, beef noodle soup with thin slices of beef & fresh herbs",
            "Ramen with chashu pork, rich tonkotsu broth, soft egg",
            "Tom kha gai, coconut milk & lemongrass soup with chicken",
            "Bún bò Huế, spicy lemongrass beef noodle soup (without pepper !)"
          ]
        };
      }

      if (cuisine === 1) {
        if (mood === 0 || mood === 2) return {
          emoji:"🍝", title:"Rich, slow-cooked & deeply satisfying",
          sub:"Hearty • Comforting • Worth the Wait",
          note:"Your best dish is also your comfort dish. Not a coincidence.",
          ideas:[
            "Classic beef lasagna with a lot of bolognese, your signature",
            "Slowly-braised beef cheek with carrots & red wine",
            "Bœuf bourguignon, the real French one, low heat, long time",
            "Spaghetti bolognese, extra beef, extra tomato, extra everything"
          ]
        };
        if (hunger <= 1) return {
          emoji:"🍅", title:"Light, fresh & very Italian",
          sub:"Simple • Fresh • No Effort",
          note:"Tomatoes are your love language and Italy agrees.",
          ideas:[
            "Bruschetta with fresh tomatoes, basil & good olive oil",
            "Caprese salad, proper mozzarella, ripe tomatoes, fresh basil",
            "Panzanella, Tuscan bread & tomato salad with a little vinegar",
            "Small bowl of pasta al pomodoro, nothing else needed"
          ]
        };
        return {
          emoji:"🍝", title:"A proper pasta moment",
          sub:"Filling • Italian • No Regrets",
          note:"Pasta is always the answer, pick your shape.",
          ideas:[
            "Tagliatelle with slow beef ragù & a handful of parmesan",
            "Gnocchi with tomato & beef sauce, pillowy and rich",
            "Pasta al forno, baked with béchamel & beef, crusty on top",
            "Rigatoni all'amatriciana, tomato & pork"
          ]
        };
      }

      if (cuisine === 2) {
        if (texture === 0 && temp !== 1) return {
          emoji:"🥘", title:"Slow-cooked, soft & deeply warming",
          sub:"Cozy • Rich • No Fuss",
          note:"This is exactly what cold-outside energy calls for.",
          ideas:[
            "Slowy-braised beef with vegetables & crusty bread",
            "Shepherd's pie, beef version, with a thick mashed potato top",
            "Sukiyaki with a lot of beef slices, sweet and savory broth",
            "Creamy tomato soup with grilled cheese on the side"
          ]
        };
        if (hunger >= 2) return {
          emoji:"🥩", title:"Substantial beef & pork, properly done",
          sub:"Filling • Meaty • Satisfying",
          note:"No fish. Beef or pork. You always know.",
          ideas:[
            "Beef burger with fresh tomatoes, lettuce & a proper sauce",
            "Pork ribs with a light BBQ glaze & crunchy coleslaw",
            "Steak with roasted potatoes & fleur de sel",
            "Mustard pork chop with pan sauce"
          ]
        };
        return {
          emoji:"🥪", title:"Easy, simple & right",
          sub:"Classic • No Overthink • Satisfying",
          note:"Sometimes simple is exactly the right call.",
          ideas:[
            "Beef & tomato sandwich on sourdough with a little mustard",
            "Pork bánh mì, crispy, herby, crunchy",
            "Croque-monsieur, with proper béchamel, not the sad microwave version",
            "Beef patty melt with caramelised onions"
          ]
        };
      }

      // Surprise me — savoury
      return {
        emoji:"🍱", title:"A curated mix of your actual favourites",
        sub:"Bold • Personal • Completely You",
        note:"No preference? We go straight to what you actually love.",
        ideas:[
          "Tteokguk, Korean rice cake soup with beef broth, surprisingly cosy",
          "Gyudon, Japanese beef rice bowl with sweet soy & soft egg (nothing else needed)",
          "Nem nướng cuốn, Vietnamese grilled pork spring rolls, fresh & punchy",
          "Pork fried rice with tomato & egg, extra crispy at the bottom"
        ]
      };
    }

    // ── BOTH SWEET & SAVOURY / NO PREF ─────────────────────────────────────

    if (mood === 1) {
      if (temp !== 0) return {
        emoji:"🍧", title:"Savoury first, sweet finish",
        sub:"Balanced • Indulgent • Celebration Mode",
        note:"Happy Annie deserves the full experience.",
        ideas:[
          "Savoury: bolognese pasta or a good bowl of phở",
          "Sweet finish: ice cream or a chocolate fondant, pick your fighter",
          "Sip on an iced matcha latte through the whole thing (no coffee!)",
          "One macaron at the end, just one, the good kind"
        ]
      };
      return {
        emoji:"🎉", title:"A proper celebration meal",
        sub:"Feast Mode • No Rules • Full Joy",
        note:"You're happy. Eat everything you love, in order.",
        ideas:[
          "Main: lasagna, your best dish, made properly",
          "Side snack while it cooks: a few gimbap rolls or edamame",
          "Drink: warm matcha latte or a good sparkling water with lemon",
          "Dessert: strawberry shortcake or a nice cheesecake slice"
        ]
      };
    }

    if (mood === 0 || mood === 2) {
      if (temp !== 1) return {
        emoji:"🛋️", title:"Warm, soft & requires zero decisions",
        sub:"Cozy • Comfort • No Stress",
        note:"Cozy food, low decisions. This is the way.",
        ideas:[
          "Phở, a big bowl, broth heals things",
          "Onigiri with salmon filling, warm rice, simple and calming",
          "Warm crêpes with butter & sugar, 10 minutes, done",
          "Bœuf bourguignon, slow cook it and forget about it"
        ]
      };
      return {
        emoji:"❄️", title:"Cold, easy & genuinely calming",
        sub:"Cold • Low Effort • Just Right",
        note:"Stress = cold food, no cooking, maximum peace.",
        ideas:[
          "Good quality ice cream, order it, eat it in peace",
          "Gimbap rolls from a Korean takeaway, fresh, no effort",
          "Chilled soba noodles with a cold dipping broth, surprisingly soothing",
          "Starbucks cold matcha drink + a small snack alongside (no coffee!)"
        ]
      };
    }

    if (hunger <= 1) return {
      emoji:"🍱", title:"Light bites, nothing heavy",
      sub:"Easy • Varied • Just a Little",
      note:"Not super hungry, just want something that feels good.",
      ideas:[
        "Caprese with ripe tomatoes & good mozzarella, can't go wrong",
        "Edamame with fleur de sel, snack-mode but elevated",
        "Gỏi cuốn, fresh Vietnamese spring rolls, light & satisfying",
        "A small matcha latte & one good pastry, that's enough"
      ]
    };

    return {
      emoji:"🍲", title:"Balanced, warm & filling",
      sub:"Varied • Satisfying • Classic",
      note:"A bit of everything. Your comfort zone, which is a good zone.",
      ideas:[
        "Gyudon, Japanese beef rice bowl, soft egg on top, soy-glazed",
        "Crêpe with ham & comté cheese + small green salad on the side",
        "Tteokbokki, Korean braised rice cakes. The mild version, not too spicy",
        "Xiao long bao, extra broth, eat slowly, savour it"
      ]
    };
  }
};

// ─── APP STATE ────────────────────────────────────────────────────────────────
let cur = 0;
let ans = new Array(Qs.length).fill(null);

function render() {
  const q = Qs[cur];
  document.getElementById('mainArea').innerHTML = `
    <div class="card">
      <div class="q-number">Question ${cur+1} of ${Qs.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options ${q.col2 ? 'col2' : ''}">
        ${q.opts.map((o,i)=>`
          <button class="opt ${ans[cur]===i?'selected':''}" onclick="pick(${i})">
            <span class="icon">${o.icon}</span>
            <span class="label">${o.label}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;

  const pct = (cur / Qs.length) * 100;
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pLabel').textContent = `${cur+1} / ${Qs.length}`;
  document.getElementById('btnBack').disabled = cur === 0;
  document.getElementById('btnNext').disabled = ans[cur] === null;
  document.getElementById('btnNext').textContent = cur === Qs.length - 1 ? '✨ Show me my meal' : 'Next →';
}

function pick(i) {
  ans[cur] = i;
  render();
}

function next() {
  if (ans[cur] === null) return;
  if (cur === Qs.length - 1) { showResult(); return; }
  cur++;
  render();
}

function prev() {
  if (cur === 0) return;
  cur--;
  render();
}

function showResult() {
  const r = Results.get(ans);
  document.getElementById('pFill').style.width = '100%';
  document.getElementById('pLabel').textContent = 'Done!';
  document.getElementById('navArea').style.display = 'none';
  document.getElementById('mainArea').innerHTML = `
    <div class="result-card">
      <span class="big">${r.emoji}</span>
      <h2>${r.title}</h2>
      <div class="sub">${r.sub}</div>
      ${r.note ? `<div class="annie-note">💬 ${r.note}</div>` : ''}
      <div class="ideas">
        <div class="ideas-title">🍴 You might want…</div>
        ${r.ideas.map(idea=>`
          <div class="idea-item"><div class="dot"></div>${idea}</div>
        `).join('')}
      </div>
      <button class="btn-restart" onclick="restart()">↩ Try again</button>
    </div>
  `;
}

function restart() {
  cur = 0;
  ans = new Array(Qs.length).fill(null);
  document.getElementById('navArea').style.display = 'flex';
  render();
}

render();
</script>
</body>
</html>
