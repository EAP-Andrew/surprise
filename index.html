<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungry? Let's Figure It Out 🍴</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --background: #0d0d0d;
  --surface: #161616;
  --border: #2a2a2a;
  --text: #f0ece4;
  --muted: #666;
  --accent: #ff5c35;
  --accent2: #ffb800;
  --accent3: #4ef0b0;
  --pill: #1e1e1e;
}

body {
  background: var(--background);
  color: var(--text);
  font-family: 'Epilogue', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
}

body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}

body::before {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #ff5c3520 0%, transparent 70%);
  top: -100px; left: -100px;
  animation: drift1 10s ease-in-out infinite alternate;
}

body::after {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #ffb80018 0%, transparent 70%);
  bottom: -80px; right: -80px;
  animation: drift2 12s ease-in-out infinite alternate;
}

@keyframes drift1 { to { transform: translate(60px, 80px); } }
@keyframes drift2 { to { transform: translate(-60px, -60px); } }

.wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 520px;
}

.header {
  margin-bottom: 36px;
  animation: fadeUp .6s cubic-bezier(.2,.8,.2,1) both;
}

.header .tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--pill);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 5px 14px 5px 10px;
  font-size: .72rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 18px;
}

.header .tag span { color: var(--accent); font-size: 1rem; }

.header h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.2rem, 7vw, 3.2rem);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -.02em;
}

.header h1 .hi { color: var(--text); }

.header h1 .hungry {
  color: transparent;
  -webkit-text-stroke: 1.5px var(--accent);
}

.header h1 .help { color: var(--accent2); }

.header p {
  margin-top: 12px;
  color: var(--muted);
  font-size: .9rem;
  font-weight: 300;
  line-height: 1.5;
}

.progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
  animation: fadeUp .6s .1s cubic-bezier(.2,.8,.2,1) both;
}

.progress-track {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}

.progress-label {
  font-size: .75rem;
  color: var(--muted);
  white-space: nowrap;
  font-weight: 300;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px 28px;
  animation: cardIn .45s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes cardIn {
  from { opacity:0; transform: translateY(20px) scale(.98); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.q-number {
  font-size: .7rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 8px;
}

.q-text {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.3rem, 4.5vw, 1.75rem);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 28px;
  color: var(--text);
}

.options {
  display: grid;
  gap: 10px;
}

.options.col2 { grid-template-columns: 1fr 1fr; }

.opt {
  background: var(--background);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px 14px;
  cursor: pointer;
  text-align: left;
  font-family: 'Epilogue', sans-serif;
  color: var(--text);
  transition: border-color .18s, background .18s, transform .15s;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.opt .icon {
  font-size: 1.6rem;
  line-height: 1;
}

.opt .label {
  font-size: .88rem;
  font-weight: 400;
  line-height: 1.3;
}

.opt:hover {
  border-color: #444;
  background: #1a1a1a;
  transform: translateY(-2px);
}

.opt.selected {
  border-color: var(--accent);
  background: #1f1008;
}

.opt.selected .label { color: var(--accent2); }

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  animation: fadeUp .5s .15s cubic-bezier(.2,.8,.2,1) both;
}

.btn-back {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Epilogue', sans-serif;
  font-size: .88rem;
  cursor: pointer;
  transition: color .2s;
  padding: 8px 0;
}

.btn-back:hover { color: var(--text); }

.btn-back:disabled { opacity:.25; cursor:default; }

.btn-next {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 13px 30px;
  font-family: 'Syne', sans-serif;
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  transition: background .18s, transform .15s, box-shadow .2s;
  box-shadow: 0 0 0 0 #ff5c3500;
  letter-spacing: .02em;
}

.btn-next:hover:not(:disabled) {
  background: #ff3a10;
  transform: translateY(-2px);
  box-shadow: 0 8px 30px #ff5c3540;
}

.btn-next:disabled {
  background: #2a2a2a;
  color: #444;
  cursor: default;
}

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 28px;
  text-align: center;
  animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes popIn {
  from { opacity:0; transform: scale(.88); }
  to   { opacity:1; transform: scale(1); }
}

.result-card .big { font-size: 80px; line-height: 1; margin-bottom: 20px; display: block; }

.result-card h2 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 800;
  margin-bottom: 6px;
  color: var(--text);
}

.result-card .sub {
  color: var(--accent2);
  font-size: .85rem;
  font-weight: 300;
  letter-spacing: .05em;
  margin-bottom: 28px;
  text-transform: uppercase;
}

.ideas {
  background: var(--background);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 20px;
  text-align: left;
  margin-bottom: 28px;
}

.ideas-title {
  font-size: .68rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent3);
  margin-bottom: 14px;
  font-weight: 500;
}

.idea-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: .9rem;
  color: var(--text);
  font-weight: 300;
}

.idea-item:last-child { border-bottom: none; padding-bottom: 0; }

.idea-item .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.btn-restart {
  background: var(--pill);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 12px;
  padding: 12px 28px;
  font-family: 'Epilogue', sans-serif;
  font-size: .88rem;
  cursor: pointer;
  transition: all .2s;
}

.btn-restart:hover {
  border-color: #555;
  color: var(--text);
  transform: translateY(-1px);
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(14px); }
  to   { opacity:1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="tag"><span>🍴</span> Annie's personnal food mood finder</div>
    <h1>
      <span class="hi">Hey </span><span class="name">Annie,</span><br>
      <span class="hungry">hungry?</span><br>
      <span class="help">let me help you.</span>
    </h1>
    <p>Answer 7 quick questions. Don't worry, no wrong answers! We will figure out what you want to eat.</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    <div class="progress-label" id="pLabel">1 / 7</div>
  </div>

  <div id="mainArea"></div>

  <div class="nav" id="navArea">
    <button class="btn-back" id="btnBack" onclick="prev()" disabled>← Back</button>
    <button class="btn-next" id="btnNext" onclick="next()" disabled>Next →</button>
  </div>

</div>

<script>
const Qs = [
  {
    q: "How hungry are you right now?",
    col2: true,
    opts: [
      { icon:"🍃", label:"Just a little something" },
      { icon:"😐", label:"Moderately hungry" },
      { icon:"😤", label:"Pretty hungry" },
      { icon:"🦁", label:"Absolutely starving" },
    ]
  },
  {
    q: "Sweet or savoury?",
    col2: true,
    opts: [
      { icon:"🍬", label:"Sweet" },
      { icon:"🧂", label:"Savory" },
      { icon:"🤷", label:"Both! Why choose?" },
      { icon:"😶", label:"No real preference" },
    ]
  },
  {
    q: "Warm & comforting or cold & refreshing?",
    col2: true,
    opts: [
      { icon:"♨️", label:"Warm & cozy" },
      { icon:"❄️", label:"Cold & refreshing" },
      { icon:"🌤️", label:"Either is fine" },
    ]
  },
  {
    q: "What's your current mood?",
    col2: true,
    opts: [
      { icon:"🛋️", label:"Tired, need comfort" },
      { icon:"🎉", label:"Happy & treating myself" },
      { icon:"😮‍💨", label:"Stressed, need calm" },
      { icon:"😌", label:"Just chilling" },
    ]
  },
  {
    q: "What texture sounds good?",
    col2: true,
    opts: [
      { icon:"🧈", label:"Soft & creamy" },
      { icon:"🥨", label:"Crunchy & crispy" },
      { icon:"🥖", label:"Chewy & hearty" },
      { icon:"🥗", label:"Light & fresh" },
    ]
  },
  {
    q: "How much effort can you be bothered with?",
    col2: true,
    opts: [
      { icon:"📱", label:"Zero, just order it" },
      { icon:"🔥", label:"Heat something up" },
      { icon:"🍳", label:"Quick cook is fine" },
      { icon:"👨‍🍳", label:"I actually want to cook" },
    ]
  },
  {
    q: "Any flavour world calling you?",
    col2: true,
    opts: [
      { icon:"🌎", label:"Asian & Southeast Asian" },
      { icon:"🍝", label:"Italian / European" },
      { icon:"🍲", label:"Classic comfort food" },
      { icon:"🤷", label:"Surprise me" },
    ]
  }
];

const Results = {
  get: (a) => {
    const hunger  = a[0]; // 0=tiny, 1=moderate, 2=pretty, 3=starving
    const taste   = a[1]; // 0=sweet, 1=savoury, 2=both, 3=no pref
    const temp    = a[2]; // 0=warm, 1=cold, 2=either
    const mood    = a[3]; // 0=tired, 1=happy, 2=stressed, 3=chill
    const texture = a[4]; // 0=soft/creamy, 1=crunchy, 2=chewy, 3=light/fresh
    const effort  = a[5]; // 0=order, 1=heat, 2=quick cook, 3=full cook
    const cuisine = a[6]; // 0=asian, 1=italian/euro, 2=comfort, 3=surprise

    // ── SWEET PATH ─────────────────────────────────────────────────────────
    if (taste === 0) {

      if (temp !== 0 && texture === 0) {
        if (hunger <= 1) return {
          emoji:"🍧", title:"Bingsu or Ice Cream?",
          sub:"Cold • Creamy • Annie's Signature Order",
          note:"You literally always end up here and you know it 😂",
          ideas: [
            "Bingsu, milk or mango shaved ice with red bean & condensed milk",
            "Chocolate chips ice cream (two scoops, obviously)",
            "Chocolate mint gelato, underrated, you know it's good",
            "Franui frozen raspberry coated in chocolate, the one, the only"
          ]
        };
        return {
          emoji:"🍨", title:"Full-On Cold Moment",
          sub:"Indulgent • Cold • Dreamy",
          note:"Hungry but still want sweet? Cold energy.",
          ideas:[
            "Chocolate ice cream sundae with a chunk of brownie",
            "Bingsu, large portion with all the toppings",
            "Franui frozen raspberry coated in chocolate, eat it straight from the box",
            "Big bowl of every ice cream you have in the freezer"
          ]
        };
      }

      if (temp !== 1 && (texture === 0 || texture === 2)) {
        if (mood === 0 || mood === 2) return {
          emoji:"🥞", title:"Fluffy Comfort",
          sub:"Warm • Soft • Feel-Good",
          note:"Comfort food + sweet.",
          ideas:[
            "Japanese fluffy pancakes, extra fluffy",
            "Classic pancakes with chocolate sauce & banana",
            "Strawberry shortcake, your comfort go-to",
            "French toast with berries & whipped cream"
          ]
        };
        return {
          emoji:"🍓", title:"Fruity Mood",
          sub:"Sweet • Fruity • Celebratory",
          note:"Happy and sweet? Desserts are the answer.",
          ideas:[
            "Strawberry shortcake & cream, perfect as always",
            "Fluffy pancakes with fresh raspberry & maple syrup",
            "Crêpes with berries & cream",
            "Starbucks strawberry drink + a pastry on the side"
          ]
        };
      }

      if (temp === 1 && texture === 3) return {
        emoji:"🍓", title:"Fresh & Fruity Pick-Me-Up",
        sub:"Light • Cold • Refreshing",
        note:"Sweet but light, smoothie or fruit bowl energy.",
        ideas:[
          "Açaí bowl with strawberry, banana & granola",
          "Fruit salad with chocolate drizzle (yes, it works)",
          "Starbucks refresher or matcha latte (no coffee!)",
          "Strawberry pie, with a lot of strawberry for sure"
        ]
      };

      if (texture === 1) return {
        emoji:"🍪", title:"Sweet Crunch",
        sub:"Sweet • Crunchy • Easy",
        note:"Classic snack mode, no shame.",
        ideas:[
          "Cookies, chocolate chip or double chocolate",
          "Waffles bites or mini churros with chocolate dip",
          "Candy mix, pick your favourites",
          "Chocolate-covered pretzels, sweet and crunchy, best of both"
        ]
      };

      return {
        emoji:"🍫", title:"Chocolate Moment",
        sub:"Sweet • Satisfying • Classic Annie",
        note:"When in doubt, chocolate is the solution. You know this.",
        ideas:[
          "Warm chocolate fondant with vanilla ice cream",
          "Franui frozen raspberry coated in chocolate, straight from the freezer",
          "Hot chocolate (rich, not too sweet)",
          "Starbucks chocolate-based drink + a pastry"
        ]
      };
    }

    // ── SAVOURY PATH ──────────────────────────────────────────────────────────
    if (taste === 1) {

      if (cuisine === 0) {
        if (temp !== 1 && hunger >= 2) return {
          emoji:"🍛", title:"Laos Fried Rice (Nam Khao)",
          sub:"Warm • Crispy Rice • Full Flavor",
          note:"You like this dish, so go for it.",
          ideas:[
            "Nam khao, Laos crispy rice salad with herbs & pork",
            "Laos fried rice with beef & tomatoes",
            "Laos khao piak, rice noodle soup with pork",
            "Beef laab with sticky rice, bold & satisfying"
          ]
        };
        if (temp === 1 || texture === 3) return {
          emoji:"🥗", title:"Tum Mak Hoong Vibes",
          sub:"Fresh • Spicy • Light",
          note:"Papaya salad is perfect, isn't it?",
          ideas:[
            "Papaya salad tum mak hoong, classic, with beef jerky not shrimp",
            "Sushi platter, salmon, tuna, avocado rolls (no shrimp)",
            "Green mango salad with crispy shallots",
            "Lemongrass beef skewers with fresh herb plate"
          ]
        };
        return {
          emoji:"🍜", title:"Southeast Asian Comfort Bowl",
          sub:"Warm • Aromatic • Filling",
          note:"Southeast Asian food hits different. This one's for you.",
          ideas:[
            "Ramen with big chunk of Chashu, rich broth",
            "Chicken satay skewer, spicy and easy to eat!",
            "Tom kha gai, coconut milk soup with pork or chicken",
            "Fried rice with pork & egg, Thai-style"
          ]
        };
      }

      if (cuisine === 1) {
        if (mood === 0 || mood === 2) return {
          emoji:"🍝", title:"Lasagna Night",
          sub:"Rich • Cheesy • Annie's Best Dish",
          note:"Your best dish and your favourite dish? This is fate.",
          ideas:[
            "Classic beef lasagna with a lot of bolognese, your signature, make it properly",
            "Bolognese pasta, with tones of bolognese",
            "Spaghetti with beef & fresh tomatoes (extra beef and extra tomatoes)",
            "Pasta al forno, baked pasta with béchamel & beef"
          ]
        };
        if (hunger <= 1) return {
          emoji:"🍅", title:"Light Italian Bites",
          sub:"Easy • Fresh • Flavourful",
          note:"Tomatoes are your friend and Italy agrees.",
          ideas:[
            "Bruschetta with fresh tomatoes, basil & olive oil",
            "Caprese salad, tomato, mozzarella, basil",
            "Panzanella, Tomato & bread salad",
            "Small bowl of pasta with pomodoro sauce"
          ]
        };
        return {
          emoji:"🍝", title:"Hearty Pasta Moment",
          sub:"Filling • Comforting • Italian",
          note:"Bolognese pasta or lasagna, you can't go wrong either way.",
          ideas:[
            "Bolognese pasta, classic bolognese, beef-forward and rich",
            "Pasta with beef, a lot of bolognese and béchamel",
            "Tagliatelle with beef ragù & parmesan",
            "Gnocchi with tomato & beef sauce"
          ]
        };
      }

      if (cuisine === 2) {
        if (texture === 0 && temp !== 1) return {
          emoji:"🥘", title:"Soft & Warming Comfort",
          sub:"Cozy • Hearty • No Fuss",
          note:"Cold outside energy = this exact meal.",
          ideas:[
            "Beef stew with crusty bread, slow-cooked, rich",
            "Shepherd's pie (beef version)",
            "Pulled pork with mash & gravy",
            "Creamy tomato soup with grilled pork toast"
          ]
        };
        if (hunger >= 2) return {
          emoji:"🥩", title:"Proper Beef & Pork Meal",
          sub:"Filling • Satisfying • Meaty",
          note:"Beef or pork, you know what you like, no fish needed.",
          ideas:[
            "Beef burger with tomatoes, lettuce & no weird sauce",
            "Pork ribs with BBQ glaze & coleslaw",
            "Steak with roasted tomatoes & fries",
            "Slow-cooked beef with rice, simple and perfect"
          ]
        };
        return {
          emoji:"🥪", title:"Easy Comfort Food",
          sub:"Classic • Simple • Satisfying",
          note:"Sometimes simple is exactly right.",
          ideas:[
            "Beef & tomato sandwich on sourdough",
            "Pork banh mi, crispy, herby, crunchy",
            "BLT with extra tomato (yes, extra)",
            "Beef patty melt with caramelised onions"
          ]
        };
      }

      return {
        emoji:"🍅", title:"Annie's Wildcard Plate",
        sub:"Bold • Personal • Totally You",
        note:"No preference means we pick what you actually love.",
        ideas:[
          "Tum mak hoong + nam khao, the dream duo",
          "Beef pho with extra herbs",
          "Lasagna leftovers (always better day 2)",
          "Pork fried rice with tomato & egg, extra crispy"
        ]
      };
    }

    // ── BOTH SWEET & SAVOURY / NO PREF ─────────────────────────────────────
    
    if (mood === 1) {
      if (temp !== 0) return {
        emoji:"🍧", title:"Treat Yourself Good",
        sub:"Sweet • Savoury • Celebration Mode",
        note:"Happy Annie deserves the best.",
        ideas:[
          "Savory first: Bolognese pasta",
          "Then: ice cream or Franui frozen raspberry coated in chocolate for dessert",
          "Starbucks matcha latte to sip on the side (no coffee!)",
          "A slice of cake if you're feeling celebratory, you deserve it"
        ]
      };
      return {
        emoji:"🎉", title:"Celebration Meal Combo",
        sub:"Hearty then Sweet • Full Feast",
        note:"You're happy, eat what you love, in order.",
        ideas:[
          "Lasagna as the main, your best dish",
          "Macaron while you wait for the food to cook",
          "Starbucks matcha latte to sip on the side (no coffee!)",
          "And Cheesecake, start to finish"
        ]
      };
    }

    if (mood === 0 || mood === 2) {
      if (temp !== 1) return {
        emoji:"🛋️", title:"Maximum Comfort Mode",
        sub:"Warm • Soft • No Stress",
        note:"You need cozy food and zero decisions. This is it.",
        ideas:[
          "Lasagna, warm, rich, effort-free if you order it",
          "Fluffy pancakes with chocolate sauce, quick to make",
          "Ramen, broth heals everything",
          "Warm chocolate fondant with ice cream for after"
        ]
      };
      return {
        emoji:"❄️", title:"Chill & Low-Effort Combo",
        sub:"Cold • Easy • Calming",
        note:"Stress calls for cold and easy. You've got this.",
        ideas:[
          "Ice cream, order it, eat it in peace",
          "Pizza takeaway, no cooking required",
          "Macaron from the best bakery",
          "Starbucks cold drink (no coffee) + something small to eat"
        ]
      };
    }

    if (hunger <= 1) return {
      emoji:"🍱", title:"Light Mixed Bites",
      sub:"Easy • Varied • Low Commitment",
      note:"Not super hungry, just want a little something good.",
      ideas:[
        "Caprese salad with fresh tomatoes, simple & perfect",
        "Bruschetta with tomatoes & olive oil",
        "Small bowl of salad",
        "Starbucks drink + small snack to pair"
      ]
    };

    return {
      emoji:"🍲", title:"Balanced & Satisfying",
      sub:"Warm • Filling • Classic Annie",
      note:"A bit of everything, your comfort zone.",
      ideas:[
        "Fried rice with eggs and pork, quick, easy, perfect",
        "Crêpe with ham and cheese + small green salad",
        "Mango with sticky rice on the side",
        "Xiao long bao, with extra broth"
      ]
    };
  }
};

// ─── APP STATE ────────────────────────────────────────────────────────────────
let cur = 0;
let ans = new Array(Qs.length).fill(null);

function render() {
  const q = Qs[cur];
  document.getElementById('mainArea').innerHTML = `
    <div class="card">
      <div class="q-number">Question ${cur+1} of ${Qs.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options ${q.col2 ? 'col2' : ''}">
        ${q.opts.map((o,i)=>`
          <button class="opt ${ans[cur]===i?'selected':''}" onclick="pick(${i})">
            <span class="icon">${o.icon}</span>
            <span class="label">${o.label}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;

  const pct = (cur / Qs.length) * 100;
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pLabel').textContent = `${cur+1} / ${Qs.length}`;
  document.getElementById('btnBack').disabled = cur === 0;
  document.getElementById('btnNext').disabled = ans[cur] === null;
  document.getElementById('btnNext').textContent = cur === Qs.length - 1 ? '✨ Show me my meal' : 'Next →';
}

function pick(i) {
  ans[cur] = i;
  render();
}

function next() {
  if (ans[cur] === null) return;
  if (cur === Qs.length - 1) { showResult(); return; }
  cur++;
  render();
}

function prev() {
  if (cur === 0) return;
  cur--;
  render();
}

function showResult() {
  const r = Results.get(ans);
  document.getElementById('pFill').style.width = '100%';
  document.getElementById('pLabel').textContent = 'Done!';
  document.getElementById('navArea').style.display = 'none';
  document.getElementById('mainArea').innerHTML = `
    <div class="result-card">
      <span class="big">${r.emoji}</span>
      <h2>${r.title}</h2>
      <div class="sub">${r.sub}</div>
      ${r.note ? `<div class="annie-note">💬 ${r.note}</div>` : ''}
      <div class="ideas">
        <div class="ideas-title">🍴 You might want…</div>
        ${r.ideas.map(idea=>`
          <div class="idea-item"><div class="dot"></div>${idea}</div>
        `).join('')}
      </div>
      <button class="btn-restart" onclick="restart()">↩ Try again</button>
    </div>
  `;
}

function restart() {
  cur = 0;
  ans = new Array(Qs.length).fill(null);
  document.getElementById('navArea').style.display = 'flex';
  render();
}

render();
</script>
</body>
</html>
